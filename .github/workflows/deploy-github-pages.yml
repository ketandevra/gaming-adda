name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check API URL secret
        env:
          API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
        run: |
          if [ -z "$API_URL" ]; then
            echo "::warning::NEXT_PUBLIC_API_URL is not set — deploying with mock data."
            echo "Add the secret under Settings → Secrets and variables → Actions to use your Google Apps Script API."
          fi

      - name: Build static site
        env:
          NEXT_PUBLIC_BASE_PATH: /gaming-adda
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_USE_MOCK_DATA: ${{ secrets.NEXT_PUBLIC_API_URL && 'false' || 'true' }}
          NEXT_PUBLIC_SHEETS_ACTION_CREATE_BOOKING: ${{ vars.NEXT_PUBLIC_SHEETS_ACTION_CREATE_BOOKING }}
          NEXT_PUBLIC_PAYMENT_UPI_VPA: ${{ vars.NEXT_PUBLIC_PAYMENT_UPI_VPA }}
          NEXT_PUBLIC_PAYMENT_UPI_PAYEE_NAME: ${{ vars.NEXT_PUBLIC_PAYMENT_UPI_PAYEE_NAME }}
        run: npm run build:gh-pages

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
